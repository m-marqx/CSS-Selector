<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selector</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body class="layout-floating">

    <!-- ═══════════ App Header ═══════════ -->
    <header class="app-header">
        <div class="app-header__brand">
            <div class="app-header__logo" aria-hidden="true">{ }</div>
            <span class="app-header__title">CSS Selector Helper</span>
        </div>
        <div class="app-header__actions">
            <button id="dock-to-page" class="btn btn--primary btn--sm">📌 Dock to Page</button>
        </div>
    </header>

    <!-- ═══════════ Main Content ═══════════ -->
    <main class="app-container" id="app-main">

        <!-- ──── Setup Mode ──── -->
        <section class="section-setup animate-in" id="section-setup">
            <label class="setup-toggle" id="setup-toggle-wrapper">
                <input type="checkbox" id="text-mode-checkbox" />
                <div class="setup-toggle__switch" aria-hidden="true"></div>
                <div class="setup-toggle__info">
                    <span class="setup-toggle__label">Text Selection Mode</span>
                    <span class="setup-toggle__desc">Target whatever you highlight on the page</span>
                </div>
            </label>
        </section>

        <!-- ──── Tip Banner ──── -->
        <div class="tip-banner animate-in" id="tip-banner">
            <span class="tip-banner__icon" aria-hidden="true">💡</span>
            <span>Click on any element to capture its class hierarchy. Tap class chips below to toggle them from the
                generated selector.</span>
        </div>

        <!-- ──── Hierarchy Tree ──── -->
        <section class="section-hierarchy panel animate-in" id="section-hierarchy">
            <div class="panel__header">
                <span class="panel__title">Element Hierarchy</span>
                <div class="panel__actions">
                    <button id="global-select-all" class="btn btn--ghost btn--sm">Select All</button>
                    <button id="global-deselect-all" class="btn btn--ghost btn--sm">Ignore All</button>
                </div>
            </div>
            <div class="panel__body">
                <div id="hierarchy" class="hierarchy-tree">
                    <div class="hierarchy-tree__empty">
                        <span class="hierarchy-tree__empty-icon" aria-hidden="true">🔍</span>
                        <span class="hierarchy-tree__empty-text">No element selected. Click an element on the
                            page.</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- ──── Selector Path ──── -->
        <section class="section-path panel animate-in" id="section-path">
            <div class="panel__header">
                <span class="panel__title">Selector Path</span>
                <div class="panel__actions">
                    <span class="panel__badge" id="path-badge" style="display:none;">
                        <span>Active</span>
                    </span>
                    <button id="copy-path" class="btn btn--secondary btn--sm">Copy</button>
                </div>
            </div>
            <div class="panel__body">
                <textarea id="path-select" class="selector-path" rows="3"
                    placeholder="Generated CSS path will appear here. Edit manually before storing..."></textarea>
            </div>
        </section>

        <!-- ──── Multi Context ──── -->
        <section class="section-multi panel animate-in" id="section-multi">
            <div class="panel__header">
                <span class="panel__title">Multi Context</span>
                <div class="panel__actions">
                    <button id="store-path" class="btn btn--secondary btn--sm">Store</button>
                    <button id="reset-multi-path" class="btn btn--danger btn--sm">Reset</button>
                    <button id="copy-multi-path" class="btn btn--secondary btn--sm">Copy</button>
                </div>
            </div>
            <div class="panel__body">
                <div id="multi-path-display" class="multi-path-display" contenteditable="true">
                    <span class="multi-path-display__placeholder">Multiple CSS paths concatenated here...</span>
                </div>
                <textarea id="multi-path-select" style="position:absolute;left:-62.5rem;" tabindex="-1"
                    readonly></textarea>
                <button id="paint-multi" class="btn btn--cta btn--full mt-3">🎯 Highlight Multi Context Paths</button>
            </div>
        </section>



    </main>

    <!-- ═══════════ Floating Footer ═══════════ -->
    <footer class="floating-footer" id="floating-footer">
        <div class="floating-footer__row">
            <input type="text" id="custom-selector" class="input-text floating-footer__input"
                placeholder=".wrapper > .item" />
            <button id="test-selector" class="btn btn--primary btn--md">Test</button>
        </div>
        <div class="floating-footer__row">
            <button id="paint-all" class="btn btn--cta btn--full btn--md">🖌 Paint Active Classes</button>
        </div>
    </footer>

    <!-- ═══════════ Toast Notification ═══════════ -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="popup.js"></script>
</body>

</html>
